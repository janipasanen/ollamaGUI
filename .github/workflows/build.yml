name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/installer-action@v0.7
        with:
          install-toolchain: stable
          component: llvm-tools-preview
          target: x86_64-unknown-linux-gnu

      - name: Install Node.js
 idea:     uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Build Tauri App
        run: npx tauri build
